<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">

    <meta name="viewport"
    content="width=device-width,
    initial-scale=1.0">

    <title>Settings</title>

    <!-- FONT -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
    rel="stylesheet">

    <!-- CSS -->
    <link rel="stylesheet"
    href="assets/css/style.css">

    <link rel="stylesheet"
    href="assets/css/settings.css">
</head>

<body>

<div class="container">

    <!-- HEADER -->
    <div class="page-header">

        <h1>Settings</h1>

        <p>Konfigurasi sistem IoT kolam</p>

    </div>

    <!-- NAMA KOLAM -->
    <div class="setting-card">

        <h3>Nama Kolam</h3>

        <p id="pondName">

    Loading...

    </p>

    </div>

    <!-- FEEDER -->
    <div class="setting-card">

        <h3>Jadwal Feeder</h3>

        <div
        class="schedule-box"
        id="feedingSchedule">

        Loading...

    </div>

    </div>

    <!-- STATUS SISTEM -->

<div class="setting-card">

    <h3>Status Sistem</h3>

    <p id="deviceStatus">

        Loading...

    </p>

    <p id="monitorStatus">

        Monitoring Aktif

    </p>

</div>

<!-- MODE -->
<div class="setting-card">

    <h3>Mode Sistem</h3>

    <p>Smart Monitoring</p>

</div>


<!-- TEMA -->
<div class="setting-card">

    <h3>Tampilan</h3>

    <select id="themeSelect">

        <option value="dark">
            Dark Mode
        </option>

        <option value="light">
            Light Mode
        </option>

    </select>

</div>


<!-- NOTIFICATION -->
<div class="setting-card">

    <h3>Notifikasi</h3>

    <select id="notificationSelect">

        <option value="on">
            ON
        </option>

        <option value="off">
            OFF
        </option>

    </select>

</div>


<!-- SAVE -->
<div class="setting-card">

    <button id="saveSettings">

        Save Settings

    </button>

</div>

<!-- LOGOUT -->

<div class="setting-card">

    <button id="logoutButton"
    class="logout-btn">

        Logout

    </button>

</div>

</div>

</nav>

</body>
</html>
