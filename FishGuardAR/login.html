<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Login | Fish Guard AR</title>

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
          rel="stylesheet">

    <!-- CSS -->
    <link rel="stylesheet"
          href="assets/css/login.css">

</head>

<body>

<div class="login-container">

    <!-- Logo -->

    <img src="assets/img/logo.png"
         class="logo"
         alt="Fish Guard AR">

    <!-- Login Card -->

    <div class="login-card">

        <h2>

            Login

        </h2>

        <!-- Email -->

        <label>Email</label>

        <input
            type="email"
            id="email"
            placeholder="admin@fishguard.com">

        <!-- Password -->

        <label>Password</label>

        <div class="password-box">

            <input
                type="password"
                id="password"
                placeholder="********">

            <button
                type="button"
                id="togglePassword">

                👁

            </button>

        </div>

        <!-- Remember -->

        <div class="remember">

            <input
                type="checkbox"
                id="remember">

            <label for="remember">

                Remember Me

            </label>

        </div>

        <!-- Login -->

        <button
            id="loginButton">

            LOGIN

        </button>

        <!-- Status -->

        <p id="loginMessage"></p>

    </div>

    <p class="version">

        Version 1.0.0

    </p>

</div>

<script src="assets/js/login.js"></script>

</body>

</html>
